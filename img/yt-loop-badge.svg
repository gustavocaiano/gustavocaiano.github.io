<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">YouTube Loop Extension</title>
  <desc id="desc">A play button inside circular loop arrows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bg)"/>

  <path d="M62 79c9-17 27-28 47-28 16 0 31 7 41 20" fill="none" stroke="url(#accent)" stroke-width="11" stroke-linecap="round"/>
  <path d="M150 60l-7 17 18-1z" fill="url(#accent)"/>

  <path d="M138 121c-9 17-27 28-47 28-16 0-31-7-41-20" fill="none" stroke="url(#accent)" stroke-width="11" stroke-linecap="round"/>
  <path d="M50 140l7-17-18 1z" fill="url(#accent)"/>

  <circle cx="100" cy="100" r="30" fill="#ef4444"/>
  <path d="M92 85l24 15-24 15z" fill="#ffffff"/>
</svg>
